name: deploy docs

on:
  push:
    branches:
      - main
      - develop
      - bugfixes

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Fetch all history for all branches
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node env 🏗
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Build main (default) docs
        run: |
          git checkout main
          pnpm run build
          mv .vitepress/dist .vitepress/dist-main
        env:
          DOCS_VERSION: stable

      - name: Build develop (latest) docs
        run: |
          git checkout develop
          pnpm run build --outDir .vitepress/dist/latest
        env:
          DOCS_VERSION: latest

      - name: Build bugfixes (patch) docs
        run: |
          git checkout bugfixes
          pnpm run build --outDir .vitepress/dist/patch
        env:
          DOCS_VERSION: patch

      - name: Combine builds
        run: |
          mv .vitepress/dist-main/* .vitepress/dist/
          rm -rf .vitepress/dist-main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .vitepress/dist/

  deploy:
    name: deploy
    needs: build

    permissions:
      pages: write # publish the built site to GitHub Pages
      id-token: write # OIDC token for the Pages deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
