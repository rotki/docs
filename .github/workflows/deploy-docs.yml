name: deploy docs

on:
  push:
    branches:
      - main
      - develop
      - bugfixes

permissions:
  contents: read

# One deploy pipeline at a time: a newer push supersedes an in-flight run.
# Each branch's build is cached per commit, so the restarted run only rebuilds
# whatever actually changed.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            version: stable
          - branch: develop
            version: latest
          - branch: bugfixes
            version: patch
    steps:
      - name: Checkout ${{ matrix.branch }} 🛎
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ matrix.branch }}
          persist-credentials: false

      - name: Resolve branch commit
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Skip the toolchain + build entirely when this exact commit was built
      # before. Only the branch that triggered the push misses the cache.
      - name: Restore built docs
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build-output
          key: docs-build-v1-${{ matrix.version }}-${{ steps.meta.outputs.sha }}

      - name: Setup pnpm
        if: steps.cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node env 🏗
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies 👨🏻‍💻
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.version }} docs
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm run build --outDir build-output
        env:
          DOCS_VERSION: ${{ matrix.version }}

      - name: Upload ${{ matrix.version }} build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-${{ matrix.version }}
          path: build-output
          retention-days: 1
          if-no-files-found: error

  assemble:
    name: assemble
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Stable lives at the site root; latest/patch are nested previews whose
      # asset URLs already point at /latest and /patch respectively.
      - name: Download stable build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-stable
          path: dist

      - name: Download latest build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-latest
          path: dist/latest

      - name: Download patch build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-patch
          path: dist/patch

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: deploy
    needs: assemble

    permissions:
      pages: write # publish the built site to GitHub Pages
      id-token: write # OIDC token for the Pages deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
